name: Jest Tests

on:
  workflow_call:

jobs:
  jest-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'
        cache: 'npm'
    - name: Install dependencies with legacy-peer-deps
      run: npm ci --legacy-peer-deps
    - name: Install Chrome
      uses: browser-actions/setup-chrome@v2
    - name: Run Jest unit tests
      run: npm run test:ci
      continue-on-error: true
      env:
        CHROME_BIN: google-chrome
    - name: Verify coverage files
      if: always()
      run: |
        echo "Checking for coverage files..."
        if [ -f "coverage/portfolio/coverage-summary.json" ]; then
          echo "✅ Coverage summary found"
          cat coverage/portfolio/coverage-summary.json | head -c 200
        else
          echo "⚠️ Coverage summary not found"
          ls -la coverage/portfolio/ 2>/dev/null || echo "Coverage directory not found"
        fi
    - name: Generate Jest summary for GitHub Actions
      if: always()
      run: node .github/scripts/jest-summary.js >> $GITHUB_STEP_SUMMARY
      env:
        DEBUG_JEST_SUMMARY: 'false'
    - name: Upload test results artifact
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: jest-test-results
        path: test-results/
        retention-days: 14
        if-no-files-found: ignore
    - name: Upload coverage reports artifact
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: jest-coverage-reports
        path: coverage/
        retention-days: 14
        if-no-files-found: ignore
    - name: Check test results
      if: always()
      run: |
        if [ ! -f "test-results/test-results.xml" ]; then
          echo "⚠️ Warning: No test results found"
        else
          echo "✅ Test results generated successfully"
        fi
