name: Test and Deploy to GH Pages

on:
  push:
    branches: ["main"]

permissions:
  checks: write
  pull-requests: write
  contents: write

jobs:
  main-ci-tests:
      uses: ./.github/workflows/main-ci-tests.yml
  build-and-deploy:
    needs: [main-ci-tests]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'
        cache: 'npm'
    - name: Build and Deploy
      env:
        CLI: true
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        npm ci
        npm run build
        npm run deploy
    - name: Verify deployment
      if: always()
      run: |
        if [ -d "dist/portfolio/browser" ]; then
          echo "✅ Build artifacts exist"
          du -sh dist/portfolio/browser
        else
          echo "⚠️ Build artifacts not found"
          exit 1
        fi
