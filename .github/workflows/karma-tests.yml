name: Karma Tests

on:
  workflow_call:

jobs:
  karma-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'
    - name: Install w/ legacy-peer-deps
      run: npm ci --legacy-peer-deps
    - name: Install Puppeteer (headless Chrome)
      run: npm install puppeteer --legacy-peer-deps --save-dev
    - name: Run tests
      run: npm run test:ci
    - name: Set Job Summary
      run: |
        echo "### Karma Results " >> $GITHUB_STEP_SUMMARY
