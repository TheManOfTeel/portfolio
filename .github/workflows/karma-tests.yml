name: Karma Tests

on:
  workflow_call:

jobs:
  karma-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'
    - name: Install w/ legacy-peer-deps
      run: npm ci --legacy-peer-deps
    - name: Install Puppeteer (headless Chrome)
      run: npm install puppeteer --legacy-peer-deps --save-dev
    - name: Run tests
      id: karma-test
      run: npx karma start karma.conf.js --single-run
        continue-on-error: true   # CRITICAL: lets the summary step run even on test failure
      env:
        CHROME_BIN: google-chrome_OUTPUT"
      shell: bash
    - name: Generate job summary
      if: always()              # run even if karma step failed
      run: node .github/scripts/karma-summary.js >> $GITHUB_STEP_SUMMARY
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: karma-test-results
        path: test-results/
        retention-days: 14
